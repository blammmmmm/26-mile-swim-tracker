<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Swim Tracker Overlay</title>
  <style>
    :root {
      --panel-opacity: .78;
      --accent: #25d8ff;
      --text: #f8fbff;
      --muted: rgba(248,251,255,.68);
      --danger: #ff4b55;
      --scale: 1;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .wrap {
      width: min(680px, calc(100vw - 20px));
      height: 230px;
      position: relative;
      transform: scale(var(--scale));
      transform-origin: center;
    }

    .card {
      position: absolute;
      inset: 0;
      border-radius: 32px;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 8%, rgba(37,216,255,.25), transparent 32%),
        linear-gradient(135deg, rgba(74,82,90,var(--panel-opacity)), rgba(21,25,31,var(--panel-opacity)));
      border: 1px solid rgba(255,255,255,.22);
      box-shadow:
        0 22px 55px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.25),
        inset 0 -1px 0 rgba(0,0,0,.32);
      backdrop-filter: blur(16px) saturate(130%);
      -webkit-backdrop-filter: blur(16px) saturate(130%);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255,255,255,.08), transparent 36%),
        repeating-linear-gradient(135deg, rgba(255,255,255,.045) 0 1px, transparent 1px 28px);
      opacity: .38;
      pointer-events: none;
    }

    .inner {
      position: relative;
      height: 100%;
      padding: 24px 32px 22px;
      color: var(--text);
      text-shadow: 0 4px 12px rgba(0,0,0,.62);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(37,216,255,.45);
      background: rgba(37,216,255,.10);
      color: var(--accent);
      box-shadow: 0 0 26px rgba(37,216,255,.16);
      flex: 0 0 auto;
    }

    .title {
      font-weight: 950;
      letter-spacing: .06em;
      font-size: 24px;
      line-height: 1;
      white-space: nowrap;
    }

    .live {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.19);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
      font-size: 15px;
      font-weight: 950;
      letter-spacing: .07em;
      line-height: 1;
      flex: 0 0 auto;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 7px rgba(255,75,85,.16), 0 0 18px rgba(255,75,85,.7);
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 30px;
      align-items: end;
      min-height: 0;
    }

    .metric-label {
      font-size: 12px;
      font-weight: 950;
      letter-spacing: .28em;
      color: var(--muted);
      margin-bottom: 7px;
      white-space: nowrap;
    }

    .miles-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .miles {
      font-size: 76px;
      line-height: .84;
      font-weight: 950;
      letter-spacing: -.075em;
      color: var(--text);
      text-shadow:
        0 8px 16px rgba(0,0,0,.72),
        0 1px 0 rgba(255,255,255,.18);
      white-space: nowrap;
    }

    .unit {
      font-size: 30px;
      font-weight: 950;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(37,216,255,.58), 0 5px 12px rgba(0,0,0,.65);
      white-space: nowrap;
    }

    .left-card {
      height: 104px;
      border-radius: 26px;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: rgba(255,255,255,.105);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
    }

    .left-num {
      font-size: 44px;
      font-weight: 950;
      line-height: .92;
      letter-spacing: -.045em;
      color: var(--text);
      text-shadow:
        0 7px 14px rgba(0,0,0,.65),
        0 1px 0 rgba(255,255,255,.15);
      white-space: nowrap;
    }

    .left-label {
      margin-top: 9px;
      font-size: 12px;
      font-weight: 950;
      letter-spacing: .26em;
      color: var(--accent);
      white-space: nowrap;
    }

    .progress-area {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
    }

    .bar {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(0,0,0,.30);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow:
        inset 0 2px 6px rgba(0,0,0,.38),
        0 7px 18px rgba(0,0,0,.18);
    }

    .fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(37,216,255,.95), rgba(106,236,255,.98));
      box-shadow: 0 0 24px rgba(37,216,255,.62);
      transition: width .45s ease;
    }

    .mini-stats {
      display: flex;
      align-items: center;
      gap: 16px;
      white-space: nowrap;
      font-weight: 900;
      color: rgba(255,255,255,.84);
    }

    .percent {
      color: var(--accent);
      font-size: 20px;
      text-shadow: 0 0 14px rgba(37,216,255,.44), 0 4px 10px rgba(0,0,0,.6);
    }

    .goal {
      font-size: 13px;
      letter-spacing: .08em;
      color: rgba(255,255,255,.62);
    }

    @media (max-width: 620px) {
      .wrap { height: 230px; }
      .inner { padding: 22px 25px 20px; }
      .title { font-size: 21px; }
      .main { grid-template-columns: 1fr 185px; gap: 18px; }
      .miles { font-size: 66px; }
      .unit { font-size: 27px; }
      .left-card { height: 98px; padding: 18px; }
      .left-num { font-size: 38px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="inner">
        <div class="top">
          <div class="brand">
            <div class="icon" aria-hidden="true">
              <svg width="29" height="29" viewBox="0 0 64 64" fill="none">
                <circle cx="30" cy="17" r="7" fill="currentColor" opacity=".95"/>
                <path d="M9 39c8-7 16-7 24 0s16 7 24 0" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                <path d="M13 51c8-6 15-6 23 0s15 6 23 0" stroke="currentColor" stroke-width="5" stroke-linecap="round" opacity=".82"/>
              </svg>
            </div>
            <div class="title">SWIM TRACKER</div>
          </div>
          <div class="live"><span class="dot"></span><span id="status">LIVE</span></div>
        </div>

        <div class="main">
          <div>
            <div class="metric-label">MILES SWAM</div>
            <div class="miles-row">
              <div class="miles" id="miles">0.00</div>
              <div class="unit">MI</div>
            </div>
          </div>

          <div class="left-card">
            <div class="metric-label">MILES LEFT</div>
            <div class="left-num" id="remaining">26.00</div>
            <div class="left-label">TO GO</div>
          </div>
        </div>

        <div class="progress-area">
          <div class="bar"><div class="fill" id="fill"></div></div>
          <div class="mini-stats">
            <span class="percent" id="percent">0%</span>
            <span class="goal" id="goalText">/ 26 MI</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script type="module">
    import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
    import { database, TRACKER_PATH, TOTAL_MILES } from "./firebase-config.js";

    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(window.location.search);

    const forcedOpacity = params.get("opacity");
    if (forcedOpacity !== null) {
      document.documentElement.style.setProperty("--panel-opacity", Math.max(0, Math.min(1, Number(forcedOpacity))));
    }

    const forcedScale = params.get("scale");
    if (forcedScale !== null) {
      document.documentElement.style.setProperty("--scale", Math.max(.4, Math.min(1.6, Number(forcedScale))));
    }

    function fmt(num) {
      return Number(num || 0).toFixed(2);
    }

    function render(data = {}) {
      const goal = Number(data.goal ?? TOTAL_MILES);
      const miles = Math.max(0, Number(data.miles ?? 0));
      const remaining = Math.max(0, goal - miles);
      const percent = goal > 0 ? Math.min(100, (miles / goal) * 100) : 0;

      $("miles").textContent = fmt(miles);
      $("remaining").textContent = fmt(remaining);
      $("percent").textContent = `${Math.round(percent)}%`;
      $("fill").style.width = `${percent}%`;
      $("status").textContent = (data.status || "LIVE").toUpperCase();
      $("goalText").textContent = `/ ${fmt(goal)} MI`;

      if (typeof data.opacity === "number") {
        document.documentElement.style.setProperty("--panel-opacity", Math.max(0, Math.min(1, data.opacity)));
      }
    }

    onValue(ref(database, TRACKER_PATH), (snapshot) => {
      render(snapshot.val() || {});
    }, () => {
      render({});
    });
  </script>
</body>
</html>
