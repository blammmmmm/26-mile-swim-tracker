<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>26 Mile Swim Tracker Overlay</title>
  <style>
    :root {
      --panel-opacity: 0.72;
      --scale: 1;
      --cyan: #16d8ff;
      --white: #f8fbff;
      --ink: #03070b;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: "Arial Black", Impact, system-ui, sans-serif;
    }
    .wrap {
      width: 720px;
      height: 360px;
      position: relative;
      transform-origin: top left;
      transform: scale(var(--scale));
    }
    .frame {
      position: absolute;
      inset: 0;
      opacity: var(--panel-opacity);
      pointer-events: none;
      filter: drop-shadow(0 14px 22px rgba(0,0,0,.55));
    }
    .dynamic { position:absolute; inset:0; pointer-events:none; }
    .goal-note {
      position:absolute; right:74px; top:61px; width:145px; text-align:center; color:#06080a;
      transform: rotate(-2deg); font-family: Impact, "Arial Black", sans-serif;
      text-shadow: 0 1px 0 rgba(255,255,255,.25);
    }
    .goal-note .goal-label { font-size: 18px; letter-spacing:.5px; }
    .goal-note .goal-num { font-size: 46px; line-height:.82; letter-spacing:1px; }
    .goal-note .goal-unit { font-size: 17px; letter-spacing:1px; }
    .main-miles {
      position:absolute; left:55px; top:104px; display:flex; align-items:flex-end; gap:12px;
      color: var(--white); letter-spacing: -4px;
      text-shadow: 0 5px 2px rgba(0,0,0,.84), 0 0 18px rgba(0,0,0,.9), 0 0 8px rgba(255,255,255,.18);
    }
    #miles { font-size: 104px; line-height:.82; }
    .mi-label {
      font-family: "Trebuchet MS", Arial, sans-serif; font-weight:900; font-size: 36px; color:var(--cyan); letter-spacing:0;
      margin-bottom: 10px; text-shadow: 0 4px 2px rgba(0,0,0,.9), 0 0 9px rgba(20,216,255,.5);
    }
    .swam-label {
      position:absolute; left:250px; top:194px; font-family:"Trebuchet MS", Arial, sans-serif; font-weight: 900;
      font-size: 29px; letter-spacing: 5px; color:#fff;
      text-shadow:0 4px 2px rgba(0,0,0,.9), 0 0 10px rgba(0,0,0,1);
      transform: rotate(.5deg);
    }
    .blue-stroke {
      position:absolute; left:312px; top:230px; width:73px; height:5px; background:#11d1ff; border-radius:10px;
      box-shadow:0 0 12px rgba(17,209,255,.75);
      transform: rotate(-1deg);
    }
    .progress-svg { position:absolute; left:0; top:0; width:720px; height:360px; overflow:visible; }
    #routeProgress {
      stroke: var(--cyan); stroke-width: 7; stroke-linecap: round; fill:none;
      filter: drop-shadow(0 0 8px rgba(22,216,255,.8)) drop-shadow(0 4px 2px rgba(0,0,0,.9));
      transition: stroke-dashoffset .45s ease;
    }
    .stat {
      position:absolute; top:292px; width:180px; text-align:center; color:#fff;
      text-shadow:0 4px 2px rgba(0,0,0,.9), 0 0 12px rgba(0,0,0,1);
      font-family:"Trebuchet MS", Arial, sans-serif;
    }
    .stat strong { display:block; font-size:34px; line-height:.95; font-family:Impact,"Arial Black",sans-serif; letter-spacing:1px; }
    .stat span { display:block; font-size:14px; font-weight:900; letter-spacing:2px; margin-top:5px; }
    .stat.percent { left:47px; color:var(--cyan); text-align:left; }
    .stat.left { left:270px; }
    .stat.goal { left:495px; }
    .quote {
      position:absolute; left:63px; bottom:52px; color:#fff; font-family:"Trebuchet MS", Arial, sans-serif;
      font-size:19px; font-weight:900; letter-spacing:1.4px; transform:rotate(-1deg);
      text-shadow:0 4px 2px rgba(0,0,0,.95), 0 0 12px rgba(0,0,0,1);
    }
    .status-pill {
      position:absolute; left:253px; top:78px; height:23px; padding:2px 10px 0 10px; display:flex; align-items:center; gap:7px;
      color:#fff; font:900 13px "Trebuchet MS",Arial,sans-serif; letter-spacing:1px; text-shadow:0 2px 2px #000;
    }
    .status-dot { width:9px; height:9px; border-radius:99px; background:#ff3434; box-shadow:0 0 9px #ff3434; }
    .status-break .status-dot { background:#ffc83d; box-shadow:0 0 9px #ffc83d; }
    .status-complete .status-dot { background:#39ff6a; box-shadow:0 0 9px #39ff6a; }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <img src="assets/tracker-frame.svg" class="frame" alt="" />
    <div class="dynamic" id="card">
      <div class="status-pill" id="statusPill"><span class="status-dot"></span><span id="statusText">LIVE</span></div>
      <div class="main-miles"><div id="miles">0.00</div><div class="mi-label">MI</div></div>
      <div class="swam-label">SWAM SO FAR</div>
      <div class="blue-stroke"></div>
      <div class="goal-note"><div class="goal-label">GOAL</div><div class="goal-num" id="goalNote">26.00</div><div class="goal-unit">MILES</div></div>
      <svg class="progress-svg" viewBox="0 0 720 360">
        <path id="routeProgress" pathLength="100" d="M78 254 C135 225, 183 285, 246 252 C310 219, 347 281, 409 250 C472 218, 523 281, 612 244" />
      </svg>
      <div class="stat percent"><strong id="percent">0%</strong><span>COMPLETE</span></div>
      <div class="stat left"><strong id="left">26.00</strong><span>MI TO GO</span></div>
      <div class="stat goal"><strong id="goal">26.00</strong><span>MI GOAL</span></div>
      <div class="quote" id="quote">“ONE STROKE AT A TIME.”</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
    import { firebaseConfig, TRACKER_PATH, TOTAL_MILES } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const trackerRef = ref(db, TRACKER_PATH);

    const defaults = {
      miles: 0,
      goal: TOTAL_MILES,
      status: "LIVE",
      opacity: 0.76,
      scale: 1,
      quote: "“ONE STROKE AT A TIME.”"
    };

    const route = document.getElementById("routeProgress");
    route.style.strokeDasharray = "100";
    route.style.strokeDashoffset = "100";

    function fmt(n) { return Number(n || 0).toFixed(2); }
    function clamp(n, min, max) { return Math.max(min, Math.min(max, Number(n) || 0)); }

    function render(data) {
      const s = { ...defaults, ...(data || {}) };
      const goal = Number(s.goal || TOTAL_MILES);
      const miles = clamp(s.miles, 0, goal);
      const pct = goal ? clamp((miles / goal) * 100, 0, 100) : 0;
      const left = Math.max(goal - miles, 0);

      document.getElementById("miles").textContent = fmt(miles);
      document.getElementById("percent").textContent = Math.round(pct) + "%";
      document.getElementById("left").textContent = fmt(left);
      document.getElementById("goal").textContent = fmt(goal);
      document.getElementById("goalNote").textContent = fmt(goal);
      document.getElementById("quote").textContent = s.quote || defaults.quote;
      document.documentElement.style.setProperty("--panel-opacity", clamp(s.opacity, 0.15, 1));
      document.documentElement.style.setProperty("--scale", clamp(s.scale, 0.4, 1.6));
      route.style.strokeDashoffset = String(100 - pct);

      const status = String(s.status || "LIVE").toUpperCase();
      const pill = document.getElementById("statusPill");
      document.getElementById("statusText").textContent = status;
      pill.classList.toggle("status-break", status.includes("BREAK"));
      pill.classList.toggle("status-complete", status.includes("COMPLETE") || status.includes("DONE"));
    }

    get(trackerRef).then(snapshot => {
      if (!snapshot.exists()) return set(trackerRef, defaults);
    });
    onValue(trackerRef, snap => render(snap.val()));
  </script>
</body>
</html>
