<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Swim Tracker Overlay</title>
  <style>
    :root {
      --panel-opacity: .78;
      --accent: #21d7ff;
      --text: #f7fbff;
      --muted: rgba(247,251,255,.76);
      --danger: #ff4c58;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .wrap {
      width: min(700px, calc(100vw - 20px));
      height: 245px;
      position: relative;
      transform: scale(var(--scale, 1));
      transform-origin: center;
    }

    .card {
      position: absolute;
      inset: 0;
      border-radius: 34px;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 12%, rgba(33, 215, 255, .28), transparent 34%),
        linear-gradient(135deg, rgba(70,78,86,var(--panel-opacity)), rgba(24,28,34,var(--panel-opacity)));
      border: 1px solid rgba(255,255,255,.22);
      box-shadow:
        0 22px 55px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.28),
        inset 0 -1px 0 rgba(0,0,0,.35);
      backdrop-filter: blur(16px) saturate(130%);
      -webkit-backdrop-filter: blur(16px) saturate(130%);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255,255,255,.08), transparent 35%),
        repeating-linear-gradient(135deg, rgba(255,255,255,.055) 0 1px, transparent 1px 28px);
      opacity: .45;
      pointer-events: none;
    }

    .inner {
      position: relative;
      height: 100%;
      padding: 26px 34px 24px;
      color: var(--text);
      text-shadow: 0 4px 12px rgba(0,0,0,.58);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      gap: 15px;
      align-items: center;
      min-width: 0;
    }

    .icon {
      width: 48px;
      height: 48px;
      border-radius: 17px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(33,215,255,.45);
      background: rgba(33,215,255,.10);
      color: var(--accent);
      box-shadow: 0 0 28px rgba(33,215,255,.14);
      flex: 0 0 auto;
    }

    .title {
      font-weight: 900;
      letter-spacing: .055em;
      font-size: 24px;
      line-height: 1;
      white-space: nowrap;
    }

    .subtitle {
      margin-top: 9px;
      font-size: 13px;
      font-weight: 850;
      letter-spacing: .34em;
      color: var(--accent);
      text-shadow: 0 0 14px rgba(33,215,255,.55), 0 3px 10px rgba(0,0,0,.6);
    }

    .live {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 17px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.20);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18);
      font-size: 17px;
      font-weight: 900;
      letter-spacing: .06em;
      line-height: 1;
      flex: 0 0 auto;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 8px rgba(255,76,88,.16), 0 0 18px rgba(255,76,88,.72);
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 190px;
      gap: 28px;
      align-items: end;
    }

    .miles-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .miles {
      font-size: 78px;
      line-height: .84;
      font-weight: 950;
      letter-spacing: -.08em;
      color: var(--text);
      text-shadow:
        0 7px 15px rgba(0,0,0,.74),
        0 1px 0 rgba(255,255,255,.18);
      max-width: 340px;
      white-space: nowrap;
    }

    .unit {
      font-size: 33px;
      font-weight: 950;
      color: var(--accent);
      letter-spacing: -.02em;
      text-shadow: 0 0 18px rgba(33,215,255,.58), 0 5px 12px rgba(0,0,0,.65);
    }

    .label {
      margin-top: 13px;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: .39em;
      color: rgba(255,255,255,.93);
      white-space: nowrap;
    }

    .goal {
      height: 104px;
      border-radius: 26px;
      display: grid;
      place-items: center;
      text-align: center;
      background: rgba(255,255,255,.105);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
    }

    .goal-label {
      font-size: 13px;
      font-weight: 950;
      letter-spacing: .32em;
      color: rgba(255,255,255,.72);
      margin-bottom: 7px;
    }

    .goal-num {
      font-size: 43px;
      font-weight: 950;
      line-height: .9;
      letter-spacing: -.045em;
    }

    .goal-unit {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 950;
      letter-spacing: .28em;
      color: var(--accent);
    }

    .bar {
      margin-top: 23px;
      width: 100%;
      height: 16px;
      border-radius: 999px;
      position: relative;
      overflow: hidden;
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow:
        inset 0 2px 6px rgba(0,0,0,.38),
        0 7px 18px rgba(0,0,0,.20);
    }

    .fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(33,215,255,.92), rgba(94,234,255,.98)),
        repeating-linear-gradient(135deg, rgba(255,255,255,.35) 0 8px, transparent 8px 16px);
      box-shadow: 0 0 24px rgba(33,215,255,.62);
      transition: width .45s ease;
    }

    .bottom {
      margin-top: 15px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .stat {
      min-width: 0;
      padding-top: 0;
    }

    .stat-value {
      font-size: 23px;
      font-weight: 950;
      letter-spacing: -.02em;
      white-space: nowrap;
    }

    .stat-value.accent { color: var(--accent); }

    .stat-label {
      margin-top: 3px;
      font-size: 11px;
      font-weight: 850;
      letter-spacing: .22em;
      color: rgba(255,255,255,.72);
      white-space: nowrap;
    }

    .divider {
      position: relative;
    }
    .divider::before {
      content: "";
      position: absolute;
      left: -7px;
      top: 2px;
      bottom: 2px;
      width: 1px;
      background: rgba(255,255,255,.18);
    }

    @media (max-width: 620px) {
      .wrap { width: calc(100vw - 12px); height: 245px; }
      .inner { padding: 24px 26px 22px; }
      .title { font-size: 20px; }
      .main { grid-template-columns: 1fr 160px; gap: 18px; }
      .miles { font-size: 68px; max-width: 300px; }
      .unit { font-size: 29px; }
      .goal { height: 96px; }
      .goal-num { font-size: 38px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="inner">
        <div class="top">
          <div class="brand">
            <div class="icon" aria-hidden="true">
              <svg width="30" height="30" viewBox="0 0 64 64" fill="none">
                <circle cx="30" cy="17" r="7" fill="currentColor" opacity=".95"/>
                <path d="M9 39c8-7 16-7 24 0s16 7 24 0" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                <path d="M13 51c8-6 15-6 23 0s15 6 23 0" stroke="currentColor" stroke-width="5" stroke-linecap="round" opacity=".82"/>
              </svg>
            </div>
            <div>
              <div class="title" id="eventTitle">SWIM TRACKER</div>
              <div class="subtitle">SWAM SO FAR</div>
            </div>
          </div>
          <div class="live"><span class="dot"></span><span id="status">LIVE</span></div>
        </div>

        <div class="main">
          <div>
            <div class="miles-row">
              <div class="miles" id="miles">0.00</div>
              <div class="unit">MI</div>
            </div>
            <div class="label">SWAM SO FAR</div>
          </div>

          <div class="goal">
            <div>
              <div class="goal-label">GOAL</div>
              <div class="goal-num" id="goal">26.00</div>
              <div class="goal-unit">MILES</div>
            </div>
          </div>
        </div>

        <div class="bar"><div class="fill" id="fill"></div></div>

        <div class="bottom">
          <div class="stat">
            <div class="stat-value accent" id="percent">0%</div>
            <div class="stat-label">COMPLETE</div>
          </div>
          <div class="stat divider">
            <div class="stat-value" id="remaining">26.00</div>
            <div class="stat-label">MI TO GO</div>
          </div>
          <div class="stat divider">
            <div class="stat-value" id="pace">--</div>
            <div class="stat-label">PACE</div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script type="module">
    import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
    import { database, TRACKER_PATH, TOTAL_MILES } from "./firebase-config.js";

    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(window.location.search);

    const forcedOpacity = params.get("opacity");
    if (forcedOpacity !== null) {
      document.documentElement.style.setProperty("--panel-opacity", Math.max(0, Math.min(1, Number(forcedOpacity))));
    }

    const forcedScale = params.get("scale");
    if (forcedScale !== null) {
      document.documentElement.style.setProperty("--scale", Math.max(.4, Math.min(1.6, Number(forcedScale))));
    }

    function fmt(num) {
      return Number(num || 0).toFixed(2);
    }

    function render(data = {}) {
      const goal = Number(data.goal ?? TOTAL_MILES);
      const miles = Math.max(0, Number(data.miles ?? 0));
      const remaining = Math.max(0, goal - miles);
      const percent = goal > 0 ? Math.min(100, (miles / goal) * 100) : 0;

      $("eventTitle").textContent = data.eventTitle || "SWIM TRACKER";
      $("miles").textContent = fmt(miles);
      $("goal").textContent = fmt(goal);
      $("remaining").textContent = fmt(remaining);
      $("percent").textContent = `${Math.round(percent)}%`;
      $("fill").style.width = `${percent}%`;
      $("status").textContent = (data.status || "LIVE").toUpperCase();
      $("pace").textContent = data.pace || "--";

      if (typeof data.opacity === "number") {
        document.documentElement.style.setProperty("--panel-opacity", Math.max(0, Math.min(1, data.opacity)));
      }
    }

    onValue(ref(database, TRACKER_PATH), (snapshot) => {
      render(snapshot.val() || {});
    }, () => {
      render({});
    });
  </script>
</body>
</html>
