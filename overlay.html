<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cliffy Swim Tracker Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #18c8ff;
      --white: #f6f0e6;
      --paper: #d9c7aa;
      --red: #ff4545;
      --dark: rgba(5, 12, 18, .70);
      --stroke: rgba(246, 240, 230, .88);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      font-family: Inter, system-ui, sans-serif;
      color: var(--white);
    }

    .overlay {
      position: relative;
      width: 1920px;
      height: 1080px;
      transform-origin: top left;
      padding: 58px 72px;
      background:
        radial-gradient(circle at 73% 22%, rgba(255, 154, 82, .28), transparent 28%),
        linear-gradient(180deg, rgba(4, 10, 16, .22), rgba(4, 10, 16, .78)),
        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=2200&q=80');
      background-size: cover;
      background-position: center;
    }

    .overlay::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 48%, rgba(0,0,0,.56) 100%);
      pointer-events: none;
    }

    .content { position: relative; z-index: 1; height: 100%; }

    .brand {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      align-items: center;
      gap: 28px;
      font-family: Permanent Marker, cursive;
      font-size: 68px;
      line-height: .85;
      letter-spacing: 1px;
      text-shadow: 0 5px 18px rgba(0,0,0,.55);
    }

    .brand small {
      display: block;
      font-size: 30px;
      color: var(--white);
      transform: rotate(-2deg);
      margin-top: 12px;
    }

    .live-pill {
      font-family: Permanent Marker, cursive;
      font-size: 38px;
      color: var(--red);
      display: flex;
      align-items: center;
      gap: 14px;
      transform: rotate(1deg);
    }

    .live-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 22px rgba(255, 69, 69, .85);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse { 50% { opacity: .45; transform: scale(.75); } }

    .main-stat {
      position: absolute;
      left: 0;
      top: 178px;
      width: 860px;
    }

    .miles {
      font-family: Permanent Marker, cursive;
      font-size: 222px;
      line-height: .78;
      letter-spacing: -9px;
      text-shadow: 0 10px 28px rgba(0,0,0,.65);
      transform: rotate(-2deg);
    }

    .miles span {
      font-family: Permanent Marker, cursive;
      color: var(--white);
      font-size: 72px;
      letter-spacing: 0;
      margin-left: 20px;
    }

    .caption {
      font-family: Permanent Marker, cursive;
      color: var(--blue);
      font-size: 58px;
      margin-left: 190px;
      margin-top: -8px;
      transform: rotate(-3deg);
      text-shadow: 0 6px 14px rgba(0,0,0,.55);
    }

    .progress-wrap {
      position: absolute;
      left: 0;
      top: 508px;
      width: 960px;
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .bar {
      position: relative;
      width: 760px;
      height: 58px;
      border: 5px solid var(--stroke);
      border-radius: 5px;
      transform: rotate(.7deg);
      background: rgba(0,0,0,.38);
      overflow: hidden;
      box-shadow: 0 8px 26px rgba(0,0,0,.45);
    }

    .fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background:
        repeating-linear-gradient(-22deg, rgba(255,255,255,.16) 0 8px, transparent 8px 20px),
        linear-gradient(90deg, rgba(24, 200, 255, .95), rgba(24, 200, 255, .68));
      box-shadow: inset 0 0 22px rgba(255,255,255,.22), 0 0 26px rgba(24,200,255,.52);
      transition: width .6s ease;
    }

    .percent {
      font-family: Permanent Marker, cursive;
      font-size: 58px;
      color: var(--white);
      transform: rotate(-3deg);
      min-width: 160px;
    }

    .progress-meta {
      display: flex;
      gap: 140px;
      margin-top: 18px;
      margin-left: 22px;
      font-family: Permanent Marker, cursive;
      font-size: 34px;
      text-shadow: 0 6px 12px rgba(0,0,0,.55);
    }

    .progress-meta b { color: var(--blue); font-size: 46px; }

    .route {
      position: absolute;
      left: 300px;
      bottom: 80px;
      width: 1240px;
      height: 260px;
    }

    .route svg { width: 100%; height: 100%; overflow: visible; }
    .route-path-bg { fill: none; stroke: rgba(255,255,255,.88); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 12 16; }
    .route-path-fill { fill: none; stroke: var(--blue); stroke-width: 10; stroke-linecap: round; filter: drop-shadow(0 0 10px rgba(24,200,255,.85)); stroke-dasharray: 0 9999; transition: stroke-dasharray .7s ease; }

    .mile-marker {
      position: absolute;
      transform: translate(-50%, -50%);
      font-family: Permanent Marker, cursive;
      font-size: 28px;
      color: var(--blue);
      text-shadow: 0 5px 12px rgba(0,0,0,.65);
    }

    .marker-dot {
      width: 22px;
      height: 22px;
      border: 4px solid var(--blue);
      border-radius: 50%;
      background: rgba(8, 16, 22, .96);
      box-shadow: 0 0 18px rgba(24,200,255,.85);
      margin: 0 auto 8px;
    }

    .finish { color: var(--white); }
    .finish .marker-dot { border-color: var(--white); box-shadow: 0 0 18px rgba(255,255,255,.75); }

    .quote {
      position: absolute;
      left: 560px;
      bottom: 6px;
      font-family: Permanent Marker, cursive;
      font-size: 48px;
      transform: rotate(-2deg);
      text-shadow: 0 7px 18px rgba(0,0,0,.65);
    }

    .paper {
      position: absolute;
      background: var(--paper);
      color: #111;
      box-shadow: 0 12px 22px rgba(0,0,0,.4);
      font-family: Permanent Marker, cursive;
      transform: rotate(3deg);
    }

    .goal-note {
      top: 24px;
      right: 42px;
      width: 310px;
      height: 190px;
      padding: 22px 28px;
      font-size: 42px;
      text-align: center;
    }

    .goal-note strong { display:block; font-size: 86px; line-height: .9; }

    .hype-note {
      left: 12px;
      bottom: 230px;
      width: 250px;
      padding: 28px;
      font-size: 42px;
      transform: rotate(-5deg);
    }

    .side-stats {
      position: absolute;
      top: 278px;
      right: 30px;
      display: grid;
      gap: 30px;
      width: 330px;
      font-family: Permanent Marker, cursive;
    }

    .stat {
      display: grid;
      grid-template-columns: 54px 1fr;
      align-items: center;
      gap: 16px;
      font-size: 30px;
      text-shadow: 0 6px 16px rgba(0,0,0,.75);
    }

    .stat svg { width: 48px; height: 48px; stroke: var(--white); fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .stat b { display:block; font-size: 48px; color: var(--white); line-height: .9; }
    .stat em { color: var(--blue); font-style: normal; }

    .elapsed-card, .remaining-card {
      position: absolute;
      bottom: 34px;
      background: rgba(0,0,0,.52);
      border: 2px dashed rgba(255,255,255,.55);
      padding: 18px 28px;
      font-family: Permanent Marker, cursive;
      box-shadow: 0 10px 26px rgba(0,0,0,.35);
    }

    .elapsed-card { right: 390px; transform: rotate(-1deg); }
    .remaining-card { right: 18px; transform: rotate(2deg); }
    .card-label { font-size: 22px; color: var(--blue); }
    .card-value { font-size: 58px; line-height: .9; }

    .day {
      position: absolute;
      left: 260px;
      bottom: 42px;
      font-family: Permanent Marker, cursive;
      font-size: 34px;
      color: #0b0b0b;
      background: var(--paper);
      padding: 10px 22px;
      transform: rotate(1deg);
    }

    .watermark-map {
      position: absolute;
      left: 250px;
      bottom: 30px;
      width: 1250px;
      height: 320px;
      border-bottom: 2px solid rgba(24,200,255,.22);
      opacity: .42;
      background:
        linear-gradient(35deg, transparent 48%, rgba(24,200,255,.2) 49%, transparent 50%),
        linear-gradient(-25deg, transparent 43%, rgba(255,255,255,.12) 44%, transparent 45%);
      background-size: 170px 90px, 210px 120px;
      mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="content">
      <div class="brand">
        <div>CLIFFY<small>PACIFIC COAST SWIM</small></div>
        <div class="live-pill"><span class="live-dot"></span><span id="statusText">LIVE</span></div>
      </div>

      <div class="main-stat">
        <div class="miles"><span id="milesValue">0.00</span><span>MILES</span></div>
        <div class="caption">SWAM SO FAR</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-row">
          <div class="bar"><div class="fill" id="barFill"></div></div>
          <div class="percent" id="percentValue">0%</div>
        </div>
        <div class="progress-meta">
          <div><b id="leftValue">26.00</b> MI TO GO</div>
          <div><b>26</b> TOTAL MILES</div>
        </div>
      </div>

      <div class="paper goal-note">GOAL<strong>26.00</strong>MILES</div>
      <div class="paper hype-note" id="hypeNote">KEEP<br>F*%#ING<br>GOING.</div>

      <div class="side-stats">
        <div class="stat">
          <svg viewBox="0 0 64 64"><path d="M8 42c10-12 18-12 28 0s18 12 20 0"/><path d="M8 26c10-12 18-12 28 0s18 12 20 0"/></svg>
          <div>CONDITIONS<b id="conditionValue">CHOPPY</b><em id="wavesValue">2-4 FT</em></div>
        </div>
        <div class="stat">
          <svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="12"/><path d="M32 4v8M32 52v8M4 32h8M52 32h8M12 12l6 6M46 46l6 6M52 12l-6 6M18 46l-6 6"/></svg>
          <div>WATER TEMP<b id="tempValue">64°F</b></div>
        </div>
        <div class="stat">
          <svg viewBox="0 0 64 64"><path d="M32 54S10 40 10 23c0-8 6-14 14-14 5 0 8 3 8 3s3-3 8-3c8 0 14 6 14 14 0 17-22 31-22 31z"/></svg>
          <div>HR AVG<b id="hrValue">--</b></div>
        </div>
      </div>

      <div class="watermark-map"></div>
      <div class="route">
        <svg viewBox="0 0 1200 250" preserveAspectRatio="none">
          <path class="route-path-bg" id="routeBg" d="M20 158 C145 72 245 198 360 122 S572 62 690 132 S885 220 1010 112 S1135 88 1180 118" />
          <path class="route-path-fill" id="routeFill" d="M20 158 C145 72 245 198 360 122 S572 62 690 132 S885 220 1010 112 S1135 88 1180 118" />
        </svg>
        <div class="mile-marker" style="left: 2%; top: 64%;"><div class="marker-dot"></div>START<br>0</div>
        <div class="mile-marker" style="left: 25%; top: 41%;"><div class="marker-dot"></div>6.5</div>
        <div class="mile-marker" style="left: 50%; top: 36%;"><div class="marker-dot"></div>13</div>
        <div class="mile-marker" style="left: 75%; top: 57%;"><div class="marker-dot"></div>19.5</div>
        <div class="mile-marker finish" style="left: 98%; top: 47%;"><div class="marker-dot"></div>26<br>FINISH</div>
      </div>

      <div class="quote" id="quoteValue">“ONE STROKE AT A TIME.”</div>
      <div class="day" id="dayValue">DAY 1</div>

      <div class="elapsed-card">
        <div class="card-label">ELAPSED TIME</div>
        <div class="card-value" id="timeValue">0:00:00</div>
      </div>
      <div class="remaining-card">
        <div class="card-label">MILES TO GO</div>
        <div class="card-value" id="remainingValue">26.00</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js';
    import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js';
    import { firebaseConfig, TRACKER_PATH, TOTAL_MILES } from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const trackerRef = ref(db, TRACKER_PATH);

    const milesValue = document.getElementById('milesValue');
    const percentValue = document.getElementById('percentValue');
    const barFill = document.getElementById('barFill');
    const leftValue = document.getElementById('leftValue');
    const remainingValue = document.getElementById('remainingValue');
    const statusText = document.getElementById('statusText');
    const routeFill = document.getElementById('routeFill');
    const hypeNote = document.getElementById('hypeNote');
    const quoteValue = document.getElementById('quoteValue');
    const dayValue = document.getElementById('dayValue');
    const timeValue = document.getElementById('timeValue');
    const tempValue = document.getElementById('tempValue');
    const wavesValue = document.getElementById('wavesValue');
    const conditionValue = document.getElementById('conditionValue');
    const hrValue = document.getElementById('hrValue');

    function fitOverlay() {
      const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      document.getElementById('overlay').style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', fitOverlay);
    fitOverlay();

    const pathLength = routeFill.getTotalLength();
    routeFill.style.strokeDasharray = `0 ${pathLength}`;

    function formatTime(seconds = 0) {
      const s = Math.max(0, Number(seconds) || 0);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60);
      return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    function updateUI(data = {}) {
      const miles = Math.min(Math.max(Number(data.miles || 0), 0), TOTAL_MILES);
      const percent = Math.min((miles / TOTAL_MILES) * 100, 100);
      const left = Math.max(TOTAL_MILES - miles, 0);
      const status = String(data.status || 'LIVE').toUpperCase();

      milesValue.textContent = miles.toFixed(2);
      percentValue.textContent = `${Math.round(percent)}%`;
      barFill.style.width = `${percent}%`;
      leftValue.textContent = left.toFixed(2);
      remainingValue.textContent = left.toFixed(2);
      statusText.textContent = status;
      hypeNote.innerHTML = data.hype ? String(data.hype).replaceAll('\n', '<br>') : 'KEEP<br>F*%#ING<br>GOING.';
      quoteValue.textContent = data.quote || '“ONE STROKE AT A TIME.”';
      dayValue.textContent = data.day || 'DAY 1';
      timeValue.textContent = formatTime(data.elapsedSeconds || 0);
      tempValue.textContent = data.waterTemp || '64°F';
      wavesValue.textContent = data.waves || '2-4 FT';
      conditionValue.textContent = data.conditions || 'CHOPPY';
      hrValue.textContent = data.hrAvg || '--';

      routeFill.style.strokeDasharray = `${pathLength * (percent / 100)} ${pathLength}`;

      if (status.includes('COMPLETE')) {
        document.documentElement.style.setProperty('--blue', '#44f27a');
      } else if (status.includes('FINAL')) {
        document.documentElement.style.setProperty('--blue', '#ff9f28');
      } else {
        document.documentElement.style.setProperty('--blue', '#18c8ff');
      }
    }

    onValue(trackerRef, (snapshot) => updateUI(snapshot.val() || {}));
  </script>
</body>
</html>
