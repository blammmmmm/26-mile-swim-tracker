<svg width="720" height="360" viewBox="0 0 720 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="paper" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <linearGradient id="cardGrad" x1="25" y1="24" x2="690" y2="345" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07141D" stop-opacity="0.92"/>
      <stop offset="0.5" stop-color="#061018" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#02070B" stop-opacity="0.90"/>
    </linearGradient>
    <linearGradient id="bluePaint" x1="0" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14D7FF"/>
      <stop offset="1" stop-color="#0078FF"/>
    </linearGradient>
  </defs>

  <!-- main card / designed static asset -->
  <g filter="url(#shadow)">
    <path d="M31 36 C93 24, 209 31, 304 27 C417 22, 528 30, 686 24 L696 322 C559 338, 427 329, 322 337 C197 346, 104 329, 21 338 Z" fill="url(#cardGrad)"/>
    <path d="M31 36 C93 24, 209 31, 304 27 C417 22, 528 30, 686 24 L696 322 C559 338, 427 329, 322 337 C197 346, 104 329, 21 338 Z" stroke="#96E9FF" stroke-opacity="0.55" stroke-width="2"/>
    <path d="M31 36 C93 24, 209 31, 304 27 C417 22, 528 30, 686 24 L696 322 C559 338, 427 329, 322 337 C197 346, 104 329, 21 338 Z" filter="url(#paper)" fill="#fff" fill-opacity="0.06"/>
  </g>

  <!-- paint/tape details -->
  <path d="M50 62 C90 56, 142 58, 184 52" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.88"/>
  <path d="M52 71 C83 67, 131 70, 174 64" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M500 59 C543 50, 594 51, 655 43 L664 94 C604 102, 547 97, 492 103 Z" fill="#E8D0A8" fill-opacity="0.88"/>
  <path d="M500 59 C543 50, 594 51, 655 43 L664 94 C604 102, 547 97, 492 103 Z" fill="#6E4A25" fill-opacity="0.08"/>
  <path d="M494 57 L529 42" stroke="#D8B581" stroke-width="9" stroke-opacity="0.8"/>
  <path d="M638 47 L673 35" stroke="#D8B581" stroke-width="9" stroke-opacity="0.8"/>

  <!-- small top labels -->
  <text x="61" y="91" font-family="Trebuchet MS, Arial, sans-serif" font-weight="800" font-size="18" fill="white" opacity="0.96" letter-spacing="1.5">PACIFIC COAST SWIM</text>
  <path d="M63 100 C112 95, 164 97, 220 91" stroke="#16C9FF" stroke-width="4" stroke-linecap="round"/>

  <!-- compass decoration -->
  <g transform="translate(640 167)" opacity="0.75">
    <circle r="27" stroke="#D8C7A8" stroke-width="2"/>
    <path d="M0 -23 L7 -4 L0 24 L-7 -4 Z" fill="#D8C7A8" fill-opacity="0.4" stroke="#D8C7A8"/>
    <path d="M-21 0 L0 -5 L21 0 L0 5 Z" fill="#D8C7A8" fill-opacity="0.23"/>
  </g>

  <!-- route base line area -->
  <path d="M78 254 C135 225, 183 285, 246 252 C310 219, 347 281, 409 250 C472 218, 523 281, 612 244" stroke="#FFFFFF" stroke-opacity="0.74" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 12"/>
  <path d="M78 254 C135 225, 183 285, 246 252 C310 219, 347 281, 409 250 C472 218, 523 281, 612 244" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
  <circle cx="78" cy="254" r="8" fill="#061018" stroke="#17D5FF" stroke-width="4"/>
  <circle cx="246" cy="252" r="7" fill="#061018" stroke="#17D5FF" stroke-width="3"/>
  <circle cx="409" cy="250" r="7" fill="#061018" stroke="#17D5FF" stroke-width="3"/>
  <circle cx="612" cy="244" r="8" fill="#061018" stroke="#fff" stroke-width="3"/>
  <text x="64" y="282" font-family="Trebuchet MS, Arial, sans-serif" font-size="15" font-weight="800" fill="#17D5FF">START</text>
  <text x="235" y="235" font-family="Trebuchet MS, Arial, sans-serif" font-size="15" font-weight="800" fill="#17D5FF">6.5</text>
  <text x="399" y="232" font-family="Trebuchet MS, Arial, sans-serif" font-size="15" font-weight="800" fill="#17D5FF">13</text>
  <text x="601" y="228" font-family="Trebuchet MS, Arial, sans-serif" font-size="15" font-weight="800" fill="#fff">26</text>
  <path d="M625 250 l17 0 m-7 -7 l7 7 l-7 7" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

  <!-- bottom stat separators -->
  <line x1="245" y1="297" x2="245" y2="331" stroke="#87DFFF" stroke-opacity="0.34"/>
  <line x1="473" y1="297" x2="473" y2="331" stroke="#87DFFF" stroke-opacity="0.34"/>
  <path d="M60 294 C135 289, 202 293, 290 289" stroke="#0AD0FF" stroke-opacity="0.18"/>
  <path d="M426 334 C501 327, 573 331, 653 326" stroke="#0AD0FF" stroke-opacity="0.16"/>
</svg>
