<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Swim Tracker Controller</title>
  <style>
    body { margin:0; min-height:100vh; background:#071018; color:#fff; font-family:Inter,system-ui,Arial,sans-serif; display:grid; place-items:center; }
    .panel { width:min(560px,calc(100vw - 28px)); background:#0d1822; border:1px solid rgba(65,210,255,.25); border-radius:18px; padding:22px; box-shadow:0 20px 50px rgba(0,0,0,.45); }
    h1 { margin:0 0 5px; font-size:24px; } p { color:#9fb5c4; margin:0 0 18px; }
    label { display:block; color:#b9d2df; font-size:12px; font-weight:800; letter-spacing:.08em; margin:16px 0 7px; text-transform:uppercase; }
    input, select { width:100%; box-sizing:border-box; border:1px solid rgba(125,220,255,.25); background:#071018; color:#fff; border-radius:10px; padding:13px; font-size:18px; outline:none; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:12px; }
    button { border:1px solid rgba(28,215,255,.45); background:#092a3d; color:#bff4ff; border-radius:10px; padding:12px; font-weight:900; cursor:pointer; }
    button.primary { width:100%; margin-top:14px; background:#0aa9dd; color:#00121c; border:none; }
    button.danger { background:#431313; color:#ffbdbd; border-color:#923333; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .hint { font-size:12px; margin-top:14px; color:#82a0ae; line-height:1.45; }
  </style>
</head>
<body>
  <main class="panel">
    <h1>26 Mile Swim Controller</h1>
    <p>Updates the compact OBS overlay live.</p>

    <label>Miles swam</label>
    <input id="miles" type="number" min="0" max="26" step="0.01" />
    <div class="grid">
      <button data-add="0.10">+0.10</button><button data-add="0.25">+0.25</button><button data-add="0.50">+0.50</button><button data-add="1">+1</button>
      <button data-add="-0.10">-0.10</button><button data-add="-0.25">-0.25</button><button data-add="-0.50">-0.50</button><button data-add="-1">-1</button>
    </div>

    <div class="row">
      <div><label>Status</label><select id="status"><option>LIVE</option><option>BREAK</option><option>FINAL MILE</option><option>COMPLETE</option></select></div>
      <div><label>Goal</label><input id="goal" type="number" min="1" step="0.01" value="26" /></div>
    </div>

    <label>Quote</label>
    <input id="quote" type="text" value="“ONE STROKE AT A TIME.”" />

    <div class="row">
      <div><label>Panel opacity</label><input id="opacity" type="range" min="0.15" max="1" step="0.01" /></div>
      <div><label>Overlay scale</label><input id="scale" type="range" min="0.55" max="1.35" step="0.01" /></div>
    </div>

    <button class="primary" id="save">Save / Sync</button>
    <button class="primary danger" id="reset">Reset to 0</button>
    <div class="hint">OBS Browser Source suggested size: 720 × 360. The page background is transparent. Keep this controller link private.</div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
    import { firebaseConfig, TRACKER_PATH, TOTAL_MILES } from "./firebase-config.js";
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const trackerRef = ref(db, TRACKER_PATH);
    const $ = id => document.getElementById(id);
    let state = { miles:0, goal:TOTAL_MILES, status:"LIVE", opacity:.76, scale:1, quote:"“ONE STROKE AT A TIME.”" };
    function clamp(n,min,max){ return Math.max(min,Math.min(max,Number(n)||0)); }
    function hydrate(s){ state={...state,...(s||{})}; $("miles").value=Number(state.miles||0).toFixed(2); $("goal").value=state.goal||26; $("status").value=state.status||"LIVE"; $("opacity").value=state.opacity ?? .76; $("scale").value=state.scale ?? 1; $("quote").value=state.quote||"“ONE STROKE AT A TIME.”"; }
    onValue(trackerRef, snap => { if (snap.exists()) hydrate(snap.val()); else set(trackerRef,state); });
    function collect(){ const goal=Number($("goal").value)||26; return { miles:clamp($("miles").value,0,goal), goal, status:$("status").value, opacity:Number($("opacity").value), scale:Number($("scale").value), quote:$("quote").value }; }
    $("save").onclick=()=>update(trackerRef,collect());
    $("reset").onclick=()=>update(trackerRef,{...collect(),miles:0,status:"LIVE"});
    document.querySelectorAll("[data-add]").forEach(btn=>btn.onclick=()=>{ const goal=Number($("goal").value)||26; const miles=clamp((Number($("miles").value)||0)+Number(btn.dataset.add),0,goal); update(trackerRef,{...collect(),miles}); });
  </script>
</body>
</html>
