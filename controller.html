<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Swim Tracker Controller</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; background: #0b0d12; color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Inter, Arial, sans-serif; display: grid; place-items: center; padding: 28px; }
  .wrap { width: min(620px, 100%); background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.14); border-radius: 28px; padding: 24px; box-shadow: 0 30px 80px rgba(0,0,0,.45); }
  h1 { margin: 0 0 6px; font-size: 25px; letter-spacing: -.03em; }
  p { margin: 0 0 22px; color: rgba(255,255,255,.62); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  label { display: grid; gap: 7px; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,.65); font-weight: 750; }
  input, select { width: 100%; border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.08); color: white; border-radius: 14px; padding: 13px 14px; font-size: 16px; outline: none; }
  input:focus, select:focus { border-color: rgba(0,213,255,.75); box-shadow: 0 0 0 4px rgba(0,213,255,.12); }
  .full { grid-column: 1 / -1; }
  .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 14px; }
  button { border: 0; border-radius: 14px; padding: 13px 12px; font-size: 15px; font-weight: 800; color: white; background: rgba(255,255,255,.11); cursor: pointer; }
  button:hover { background: rgba(255,255,255,.17); }
  .primary { background: #00aee8; color: #001018; }
  .danger { background: rgba(255,72,82,.22); color: #ffb6bb; }
  .save { margin-top: 16px; width: 100%; padding: 15px; background: linear-gradient(180deg, #68e7ff, #00b6ea); color: #00131b; }
  .note { margin-top: 18px; font-size: 13px; color: rgba(255,255,255,.52); line-height: 1.45; }
  @media (max-width: 560px) { .grid, .buttons { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Swim Tracker Control</h1>
    <p>Updates the OBS overlay live through Firebase.</p>
    <div class="grid">
      <label>Miles swam<input id="miles" type="number" step="0.01" min="0" value="0"></label>
      <label>Goal<input id="goal" type="number" step="0.01" min="0" value="26"></label>
      <label>Status<select id="status"><option>LIVE</option><option>BREAK</option><option>FINAL MILE</option><option>COMPLETE</option></select></label>
      <label>Panel opacity<input id="opacity" type="range" min="0.05" max="0.95" step="0.01" value="0.68"></label>
      <label class="full">Current pace<input id="pace" placeholder="ex: 1:42 /100yd"></label>
      <label class="full">Quote<input id="quote" value="One stroke at a time. No quit."></label>
      <label class="full">Subtitle<input id="subtitle" value="Pacific Coast Tracker"></label>
    </div>
    <div class="buttons">
      <button data-delta="0.25">+0.25</button><button data-delta="0.5">+0.5</button><button data-delta="1">+1</button><button data-delta="-0.25">-0.25</button>
    </div>
    <button class="save primary" id="save">Save / Update Overlay</button>
    <button class="save danger" id="reset">Reset Miles to 0</button>
    <div class="note">OBS URL: overlay.html. Suggested Browser Source size: 720 × 270. Add ?opacity=0.55 or ?scale=0.9 if needed.</div>
  </div>
<script type="module">
  import { database, TRACKER_PATH, TOTAL_MILES } from "./firebase-config.js";
  import { ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

  const trackerRef = ref(database, TRACKER_PATH);
  const $ = id => document.getElementById(id);
  const defaults = { miles: 0, goal: TOTAL_MILES, status: 'LIVE', opacity: 0.68, title: '26 MILE SWIM', subtitle: 'Pacific Coast Tracker', pace: '--', quote: 'One stroke at a time. No quit.' };
  let current = { ...defaults };

  function readForm(){
    return {
      miles: Number($('miles').value || 0),
      goal: Number($('goal').value || TOTAL_MILES),
      status: $('status').value,
      opacity: Number($('opacity').value || .68),
      title: '26 MILE SWIM',
      subtitle: $('subtitle').value || defaults.subtitle,
      pace: $('pace').value || '--',
      quote: $('quote').value || defaults.quote
    };
  }
  function fillForm(data){
    current = { ...defaults, ...(data || {}) };
    $('miles').value = current.miles;
    $('goal').value = current.goal;
    $('status').value = current.status;
    $('opacity').value = current.opacity;
    $('subtitle').value = current.subtitle;
    $('pace').value = current.pace;
    $('quote').value = current.quote;
  }

  onValue(trackerRef, snap => {
    if (!snap.exists()) { set(trackerRef, defaults); return; }
    fillForm(snap.val());
  });
  $('save').onclick = () => set(trackerRef, readForm());
  $('reset').onclick = () => update(trackerRef, { ...readForm(), miles: 0 });
  document.querySelectorAll('[data-delta]').forEach(btn => btn.onclick = () => {
    const data = readForm();
    const goal = Number(data.goal || TOTAL_MILES);
    const next = Math.max(0, Math.min(goal, Number(data.miles || 0) + Number(btn.dataset.delta)));
    data.miles = Math.round(next * 100) / 100;
    $('miles').value = data.miles;
    set(trackerRef, data);
  });
</script>
</body>
</html>
