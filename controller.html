<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Swim Tracker Controller</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #080d14; color: white; font-family: Arial, sans-serif; display: grid; place-items: center; padding: 24px; }
    .panel { width: min(560px, 100%); background: #111a25; border: 1px solid rgba(255,255,255,.16); border-radius: 18px; padding: 22px; box-shadow: 0 20px 60px rgba(0,0,0,.35); }
    h1 { margin: 0 0 16px; font-size: 22px; }
    label { display: block; color: #9fb2c8; font-size: 13px; margin: 15px 0 6px; }
    input, select { width: 100%; border: 1px solid rgba(255,255,255,.2); border-radius: 10px; background: #07101a; color: white; padding: 12px; font-size: 18px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 12px; }
    button { border: 0; border-radius: 10px; padding: 13px 12px; font-weight: 800; cursor: pointer; background: #20c8ff; color: #03101a; font-size: 15px; }
    button.dark { background: #263445; color: white; }
    button.red { background: #d93636; color: white; }
    button.green { background: #2cd46b; color: #03100a; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .small { color: #9fb2c8; font-size: 13px; margin-top: 14px; line-height: 1.45; }
    .links { margin-top: 18px; padding: 12px; background: rgba(255,255,255,.06); border-radius: 12px; font-size: 13px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Swim Tracker Controller</h1>

    <div class="row">
      <div>
        <label>Miles swam</label>
        <input id="miles" type="number" step="0.01" min="0" max="26" />
      </div>
      <div>
        <label>Panel opacity</label>
        <input id="panelOpacity" type="number" step="0.05" min="0" max="1" />
      </div>
    </div>

    <div class="grid">
      <button data-add="0.10">+0.10</button>
      <button data-add="0.25">+0.25</button>
      <button data-add="0.50">+0.50</button>
      <button data-add="1">+1</button>
      <button class="dark" data-add="-0.10">-0.10</button>
      <button class="dark" data-add="-0.25">-0.25</button>
      <button class="dark" data-add="-0.50">-0.50</button>
      <button class="red" id="reset">Reset</button>
    </div>

    <label>Status</label>
    <select id="status">
      <option>LIVE</option>
      <option>BREAK</option>
      <option>FINAL MILE</option>
      <option>COMPLETE</option>
    </select>

    <label>Title</label>
    <input id="title" type="text" />

    <label>Subtitle</label>
    <input id="subtitle" type="text" />

    <div class="grid" style="grid-template-columns: 1fr 1fr;">
      <button class="green" id="save">Save / Sync</button>
      <button class="red" id="complete">Set Complete</button>
    </div>

    <p class="small">OBS overlay is transparent and sized like a real stream tracker. You can resize it inside OBS or add URL params like <b>?opacity=0.6&scale=0.85</b>.</p>
    <div class="links">Overlay: <span id="overlayLink"></span></div>
  </div>

  <script type="module">
    import { ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
    import { database, TRACKER_PATH, TOTAL_MILES } from "./firebase-config.js";

    const trackerRef = ref(database, TRACKER_PATH);
    const defaults = { miles: 0, goal: TOTAL_MILES, status: "LIVE", panelOpacity: .78, title: "CLIFFY SWIM TRACKER", subtitle: "SWAM SO FAR" };
    const fields = ["miles", "panelOpacity", "status", "title", "subtitle"].reduce((a, id) => (a[id] = document.getElementById(id), a), {});
    document.getElementById("overlayLink").textContent = location.href.replace("controller.html", "overlay.html");

    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
    function readForm() {
      return {
        miles: clamp(Number(fields.miles.value || 0), 0, TOTAL_MILES),
        goal: TOTAL_MILES,
        status: fields.status.value,
        panelOpacity: clamp(Number(fields.panelOpacity.value || .78), 0, 1),
        title: fields.title.value || defaults.title,
        subtitle: fields.subtitle.value || defaults.subtitle
      };
    }
    function fillForm(data) {
      fields.miles.value = Number(data.miles ?? 0).toFixed(2);
      fields.panelOpacity.value = data.panelOpacity ?? .78;
      fields.status.value = data.status || "LIVE";
      fields.title.value = data.title || defaults.title;
      fields.subtitle.value = data.subtitle || defaults.subtitle;
    }

    onValue(trackerRef, snap => {
      if (!snap.exists()) set(trackerRef, defaults);
      fillForm({ ...defaults, ...(snap.val() || {}) });
    });

    document.getElementById("save").onclick = () => set(trackerRef, readForm());
    document.getElementById("complete").onclick = () => set(trackerRef, { ...readForm(), miles: TOTAL_MILES, status: "COMPLETE" });
    document.getElementById("reset").onclick = () => set(trackerRef, defaults);
    document.querySelectorAll("[data-add]").forEach(btn => {
      btn.onclick = () => {
        const next = clamp(Number(fields.miles.value || 0) + Number(btn.dataset.add), 0, TOTAL_MILES);
        fields.miles.value = next.toFixed(2);
        update(trackerRef, { ...readForm(), miles: next });
      };
    });
  </script>
</body>
</html>
