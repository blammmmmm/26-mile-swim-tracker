<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Swim Tracker Controller</title>
<style>
body{font-family:Inter,system-ui,sans-serif;background:#111;color:white;margin:0;padding:30px} .box{max-width:520px;margin:auto;background:#1d1d1f;border:1px solid #333;border-radius:24px;padding:24px} label{display:block;margin:18px 0 8px;color:#aaa;font-weight:700} input{width:100%;font-size:24px;padding:12px;border-radius:14px;border:1px solid #444;background:#0b0b0c;color:white} button{margin-top:20px;width:100%;padding:16px;border-radius:16px;border:0;background:#34d9ff;font-size:20px;font-weight:900;color:#001014} .row{display:grid;grid-template-columns:1fr 1fr;gap:12px} small{color:#aaa;display:block;margin-top:14px;line-height:1.4}</style>
</head><body><div class="box"><h1>Swim Tracker</h1><div class="row"><div><label>Miles Swam</label><input id="swam" type="number" min="0" step="0.01" value="0"></div><div><label>Total Miles</label><input id="total" type="number" min="0.01" step="0.01" value="26"></div></div><label>Panel Opacity</label><input id="opacity" type="range" min="0.15" max="1" step="0.01" value="0.86"><button id="save">Update Overlay</button><small>Open overlay.html in OBS. If hosted on the same domain/browser, this updates through localStorage. You can also use URL params like overlay.html?swam=8.5&total=26&opacity=.8</small></div><script>
const swam=document.getElementById('swam'), total=document.getElementById('total'), opacity=document.getElementById('opacity');
const saved=JSON.parse(localStorage.getItem('swimTrackerState')||'{}'); swam.value=saved.swam??0; total.value=saved.total??26; opacity.value=saved.opacity??.86;
document.getElementById('save').onclick=()=>{localStorage.setItem('swimTrackerState',JSON.stringify({swam:Number(swam.value),total:Number(total.value),opacity:Number(opacity.value)})); alert('Updated');};
</script></body></html>
